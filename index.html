<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHUOTLOG84.TV | Hành Trình Tự Do</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.highcharts.com/maps/highmaps.js"></script>
    <script src="https://code.highcharts.com/maps/modules/exporting.js"></script>
</head>
<body style="font-family: 'Times New Roman', Times, serif;">

    <!-- Màn hình chờ (Loading) -->
    <div id="loading-screen" style="position: fixed; inset: 0; background: #0f172a; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s;">
        <div class="motorcycle-loader">🏍️</div>
        <h2 style="color: #ff6b6b; margin-top: 2rem; letter-spacing: 5px;">ĐANG NỔ MÁY...</h2>
    </div>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 id="main-title" style="font-size: 5rem; font-weight: 900; margin-bottom: 1rem;">PHUOTLOG84.TV</h1>
            <p id="typewriter" class="hero-subtitle"></p>
            <div class="scroll-indicator">↓ Cuộn để khám phá</div>
        </div>
    </header>

    <!-- Thống kê Cloud -->
    <section class="stats-section">
        <div class="stats-grid">
            <div class="stat-card">
                <p class="stat-label">TỔNG QUÃNG ĐƯỜNG</p>
                <h2 class="stat-number" data-target="0">0</h2>
                <span class="stat-unit">KM</span>
            </div>
            <div class="stat-card">
                <p class="stat-label">TỈNH THÀNH</p>
                <h2 class="stat-number" data-target="0">0</h2>
                <span class="stat-unit">/ 63</span>
            </div>
            <div class="stat-card">
                <p class="stat-label">ĐỈNH NÚI</p>
                <h2 class="stat-number" data-target="0">0</h2>
                <span class="stat-unit">ĐỈNH</span>
            </div>
            <div class="stat-card">
                <p class="stat-label">SỐ NĂM</p>
                <h2 class="stat-number" data-target="0">0</h2>
                <span class="stat-unit">NĂM</span>
            </div>
        </div>
    </section>

    <!-- Bản đồ Việt Nam -->
    <section class="map-section" style="padding: 4rem 0; position: relative;">
        <h2 style="text-align: center; font-size: 2.5rem; margin-bottom: 2rem; color: var(--secondary-color);">BẢN ĐỒ DẤU CHÂN</h2>
        <div id="vietnam-map" style="width: 100%; height: 700px; margin: 0 auto;">
            <p style="text-align: center; color: var(--text-muted); padding-top: 200px;">Đang tải bản đồ...</p>
        </div>
    </section>

    <!-- Timeline Hành trình -->
    <section class="timeline-section" style="padding: 6rem 0;">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4rem;">
                <h2 style="font-size: 3rem; color: #fff;">DÒNG THỜI GIAN</h2>
                <select id="yearFilter" class="glass-select">
                    <option value="all">Tất cả năm</option>
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                </select>
            </div>
            
            <div id="timeline-content" class="timeline-container">
                <!-- Dữ liệu từ Firebase -->
            </div>
        </div>
    </section>

    <!-- Modal Chi tiết -->
    <div id="tripModal" class="modal" onclick="if(event.target==this) closeTripModal()">
        <div class="modal-content">
            <span class="close-modal" onclick="closeTripModal()">&times;</span>
            <div id="modalDetailContent"></div>
        </div>
    </div>

    <!-- Lightbox cho ảnh -->
    <div id="lightbox" class="lightbox">
        <img src="" alt="Full view">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWwqbO7zNoUT-_NvJ12oPzzrkNJbv_xco",
            authDomain: "phuotlog.firebaseapp.com",
            projectId: "phuotlog",
            storageBucket: "phuotlog.firebasestorage.app",
            messagingSenderId: "349647181935",
            appId: "1:349647181935:web:360d32ac7a0ebcb28fd59a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', async () => {
            const timelineContent = document.getElementById('timeline-content');
            const yearFilter = document.getElementById('yearFilter');
            const tripModal = document.getElementById('tripModal');
            const modalDetailContent = document.getElementById('modalDetailContent');

            // 1. NẠP THỐNG KÊ
            try {
                const statsSnap = await getDoc(doc(db, "settings", "stats"));
                if (statsSnap.exists()) {
                    const stats = statsSnap.data();
                    const nums = document.querySelectorAll('.stat-number');
                    nums[0].setAttribute('data-target', (stats.km || "0").replace(/,/g, ''));
                    nums[1].setAttribute('data-target', stats.provinces || "0");
                    nums[2].setAttribute('data-target', stats.peaks || "0");
                    nums[3].setAttribute('data-target', stats.years || "0");
                    startCounters();
                }
            } catch (e) { console.error(e); }

            // 2. NẠP HÀNH TRÌNH
            let trips = [];
            const fetchTrips = async () => {
                const q = query(collection(db, "trips"), orderBy("year", "desc"));
                const querySnapshot = await getDocs(q);
                trips = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTimeline();
            };
            fetchTrips();

            function renderTimeline(filterYear = 'all') {
                timelineContent.innerHTML = '';
                const filtered = filterYear === 'all' ? trips : trips.filter(t => t.year == filterYear);
                if (filtered.length === 0) {
                    timelineContent.innerHTML = `<p style="text-align:center; padding: 5rem;">Chưa có chuyến đi nào trong năm ${filterYear}.</p>`;
                    return;
                }
                filtered.forEach((trip, idx) => {
                    const isEven = idx % 2 !== 0;
                    timelineContent.innerHTML += `
                        <div class="year-block" style="margin-bottom: 8rem;">
                            <div class="year-label-bubble">${trip.year}</div>
                            <div style="display: flex; flex-wrap: wrap; gap: 3rem; ${isEven ? 'flex-direction: row-reverse;' : ''} align-items: center;">
                                <div class="content-card-wrapper" style="flex: 1; min-width: 300px;">
                                    <div class="content-card">
                                        <div onclick="showTripDetail('${trip.id}')" style="cursor: pointer;">
                                            <img src="${trip.image}" style="width: 100%; height: 300px; object-fit: cover;">
                                            <div style="padding: 1.5rem;">
                                                <h2 style="color: var(--primary-color);">${trip.name}</h2>
                                                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                                                    <span>🏍️ ${trip.km} KM</span>
                                                    <span style="color: #feca57;">💸 ${trip.cost || '---'} đ</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div style="flex: 1; min-width: 300px; text-align: ${isEven ? 'right' : 'left'};">
                                    <h3 style="color: var(--secondary-color); margin-bottom: 1rem;">Lộ trình</h3>
                                    <p style="font-size: 1.1rem; line-height: 1.8;">${trip.route || 'Đang cập nhật...'}</p>
                                    <button class="view-more-btn" onclick="showTripDetail('${trip.id}')" style="margin-top: 1.5rem;">XEM NHẬT KÝ 📜</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            window.showTripDetail = (id) => {
                const trip = trips.find(t => t.id === id);
                if (!trip) return;
                modalDetailContent.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem;">
                        <div>
                            <h2 style="color: var(--secondary-color); font-size: 2.5rem;">${trip.name}</h2>
                            <p style="margin-top: 1rem;"><strong>Khoảng cách:</strong> ${trip.km} KM | <strong>Chi phí:</strong> ${trip.cost} đ</p>
                            <h4 style="margin-top: 2rem;">Lộ trình:</h4><p>${trip.route}</p>
                            <h4 style="margin-top: 2rem;">Cảm nhận:</h4><p style="font-style: italic;">"${trip.feel}"</p>
                        </div>
                        <div>
                            <h3>Album Ảnh 📸</h3>
                            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1rem; margin-top: 1.5rem;">
                                ${trip.album ? trip.album.map(img => `<img src="${img}" class="album-thumb" onclick="openLightbox('${img}')">`).join('') : '<p>Chưa có ảnh.</p>'}
                            </div>
                        </div>
                    </div>
                `;
                tripModal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            };

            window.closeTripModal = () => {
                tripModal.style.display = 'none';
                document.body.style.overflow = 'auto';
            };

            yearFilter.onchange = (e) => renderTimeline(e.target.value);

            function startCounters() {
                document.querySelectorAll('.stat-number').forEach(counter => {
                    const target = +counter.getAttribute('data-target');
                    let count = 0;
                    const inc = target / 50;
                    const update = () => {
                        if (count < target) {
                            count += inc;
                            counter.innerText = Math.ceil(count).toLocaleString();
                            setTimeout(update, 20);
                        } else { counter.innerText = target.toLocaleString(); }
                    };
                    update();
                });
            }
        });

        window.openLightbox = (src) => {
            const lb = document.getElementById('lightbox');
            lb.querySelector('img').src = src;
            lb.style.display = 'flex';
        };
        document.getElementById('lightbox').onclick = function() { this.style.display = 'none'; };

        // TẮT MÀN HÌNH CHỜ (Cực kỳ quan trọng)
        const hideLoading = () => {
            const ls = document.getElementById('loading-screen');
            if (ls) {
                ls.style.opacity = '0';
                setTimeout(() => ls.style.display = 'none', 1000);
            }
        };
        setTimeout(hideLoading, 2000);
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
