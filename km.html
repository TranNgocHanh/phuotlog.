<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống Kê Hành Trình | phuotlog84.tv</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stats-page-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 5rem 5%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .stats-hero {
            text-align: center;
            margin-bottom: 5rem;
        }

        .stats-hero h1 {
            font-size: 4rem;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .big-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
            width: 100%;
            max-width: 1200px;
        }

        .big-stat-card {
            background: var(--card-bg);
            padding: 4rem 2rem;
            border-radius: 40px;
            text-align: center;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .big-stat-card:hover {
            transform: translateY(-15px);
            border-color: var(--primary-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .big-stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,107,107,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: 0.5s;
        }

        .big-stat-card:hover::before {
            opacity: 1;
        }

        .stat-val {
            font-size: 5rem;
            font-weight: 900;
            color: white;
            display: block;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .stat-desc {
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .back-home {
            margin-top: 5rem;
            padding: 1.2rem 3rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .back-home:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="stats-page-container">
        <div class="stats-hero">
            <h1>CỘT MỐC TỔ QUỐC</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem;">Những con số biết nói về hành trình chinh phục Việt Nam của tôi.</p>
        </div>

        <div class="big-stats-grid">
            <div class="big-stat-card">
                <span class="stat-val" id="dispKm">0</span>
                <span class="stat-desc">TỔNG KM ĐÃ ĐI</span>
            </div>
            <div class="big-stat-card">
                <span class="stat-val" id="dispProvinces">0</span>
                <span class="stat-desc">TỈNH THÀNH ĐÃ QUA</span>
            </div>
            <div class="big-stat-card">
                <span class="stat-val" id="dispPeaks">0</span>
                <span class="stat-desc">ĐỈNH NÚI CHINH PHỤC</span>
            </div>
            <div class="big-stat-card">
                <span class="stat-val" id="dispYears">0</span>
                <span class="stat-desc">NĂM HÀNH TRÌNH</span>
            </div>
        </div>

        <a href="index.html" class="back-home">← QUAY LẠI TRANG CHỦ</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const myStats = JSON.parse(localStorage.getItem('myStats')) || { km: "10,500", provinces: "35", peaks: "15", years: "4" };
            
            document.getElementById('dispKm').innerText = myStats.km;
            document.getElementById('dispProvinces').innerText = myStats.provinces;
            document.getElementById('dispPeaks').innerText = myStats.peaks;
            document.getElementById('dispYears').innerText = myStats.years;
        });
    </script>
</body>
</html>
