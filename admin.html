<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị | phuotlog.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <nav>
        <div class="logo">PHUOTLOG ADMIN.</div>
        <div class="nav-links">
            <a href="index.html">Về trang chủ</a>
            <a href="#" class="admin-btn">Đăng xuất</a>
        </div>
    </nav>

    <main class="admin-container">
        <header style="margin-bottom: 3rem;">
            <h1 style="font-size: 3rem;">Thêm Hành Trình Mới</h1>
            <p style="color: var(--text-muted);">Cập nhật những cung đường mới nhất của bạn vào Timeline.</p>
        </header>

        <form class="form-grid" id="tripForm">
            <div class="input-group">
                <label>Tên chuyến đi</label>
                <input type="text" placeholder="Ví dụ: Chinh phục cực Bắc" required>
            </div>
            <div class="input-group">
                <label>Năm thực hiện</label>
                <select required>
                    <option value="2020">2020</option>
                    <option value="2021">2021</option>
                    <option value="2022">2022</option>
                    <option value="2023" selected>2023</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                </select>
            </div>
            <div class="input-group">
                <label>Số KM đã đi</label>
                <input type="number" placeholder="Ví dụ: 1500">
            </div>
            <div class="input-group">
                <label>Ngày khởi hành</label>
                <input type="date" required>
            </div>
            <div class="input-group" style="grid-column: span 2;">
                <label>Hình ảnh chuyến đi</label>
                <div class="file-upload-wrapper">
                    <label for="imageUpload" class="file-upload-label">
                        <span id="uploadText">📸 Nhấn để chọn ảnh từ máy tính</span>
                        <input type="file" id="imageUpload" accept="image/*" required>
                    </label>
                    <img id="imagePreview" src="#" alt="Xem trước ảnh">
                </div>
            </div>
            <div class="input-group" style="grid-column: span 2;">
                <label>Cảm nhận về chuyến đi</label>
                <textarea rows="5" placeholder="Chia sẻ cảm xúc của bạn về hành trình này..."></textarea>
            </div>
            <button type="submit" class="submit-btn">CẬP NHẬT HÀNH TRÌNH</button>
        </form>

        <section class="recent-trips">
            <h2 style="margin-bottom: 1.5rem;">Các chuyến đi đã đăng</h2>
            <table style="width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 16px; overflow: hidden;">
                <thead>
                    <tr style="background: rgba(255,255,255,0.05); text-align: left;">
                        <th style="padding: 1.5rem;">Tên chuyến đi</th>
                        <th style="padding: 1.5rem;">Năm</th>
                        <th style="padding: 1.5rem;">Trạng thái</th>
                        <th style="padding: 1.5rem;">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="tripTableBody">
                    <!-- Dữ liệu sẽ được hiển thị ở đây bằng JS -->
                </tbody>
            </table>
        </section>
    </main>

    <script>
        // Tải dữ liệu từ LocalStorage hoặc dùng mặc định nếu chưa có
        let trips = JSON.parse(localStorage.getItem('myTrips')) || [
            { id: 1, name: "Hà Giang Loop", year: "2023", km: 2500, feel: "Hành trình tuyệt vời nhất đời mình." },
            { id: 2, name: "Phú Yên - Quy Nhơn", year: "2024", km: 1200, feel: "Biển xanh vẫy gọi." }
        ];

        let editId = null;

        const tripForm = document.getElementById('tripForm');
        const imageUpload = document.getElementById('imageUpload');
        const imagePreview = document.getElementById('imagePreview');
        const uploadText = document.getElementById('uploadText');
        const tripTableBody = document.getElementById('tripTableBody');

        // Hàm lưu vào LocalStorage
        function saveToLocal() {
            localStorage.setItem('myTrips', JSON.stringify(trips));
        }

        function renderTrips() {
            tripTableBody.innerHTML = '';
            trips.forEach((trip) => {
                const row = `
                    <tr style="border-bottom: 1px solid var(--glass-border);">
                        <td style="padding: 1.5rem;">${trip.name}</td>
                        <td style="padding: 1.5rem;">${trip.date || trip.year}</td>
                        <td style="padding: 1.5rem;"><span style="color: var(--secondary-color);">● Đã đăng</span></td>
                        <td style="padding: 1.5rem;">
                            <button onclick="editTrip(${trip.id})" style="background:none; border:none; color: var(--secondary-color); cursor:pointer; margin-right: 10px;">Sửa</button>
                            <button onclick="deleteTrip(${trip.id})" style="background:none; border:none; color: var(--primary-color); cursor:pointer;">Xóa</button>
                        </td>
                    </tr>
                `;
                tripTableBody.innerHTML += row;
            });
        }

        imageUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                uploadText.textContent = `📁 Đã chọn: ${file.name}`;
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        window.editTrip = function(id) {
            const trip = trips.find(t => t.id === id);
            if (trip) {
                editId = id;
                document.querySelectorAll('input')[0].value = trip.name;
                document.querySelector('select').value = trip.year;
                document.querySelectorAll('input')[1].value = trip.km;
                document.querySelectorAll('input')[2].value = trip.date || ""; // Ô ngày tháng
                document.querySelector('textarea').value = trip.feel;
                window.scrollTo({ top: 0, behavior: 'smooth' });
                document.querySelector('.submit-btn').innerText = "LƯU THAY ĐỔI";
            }
        }

        window.deleteTrip = function(id) {
            if (confirm('Bạn có chắc chắn muốn xóa?')) {
                trips = trips.filter(t => t.id !== id);
                saveToLocal();
                renderTrips();
            }
        }

        tripForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const inputs = document.querySelectorAll('input');
            const newTrip = {
                id: editId || Date.now(),
                name: inputs[0].value,
                year: document.querySelector('select').value,
                km: inputs[1].value,
                feel: document.querySelector('textarea').value,
                image: imagePreview.src // Lưu luôn chuỗi ảnh Base64
            };

            if (editId) {
                const index = trips.findIndex(t => t.id === editId);
                trips[index] = newTrip;
                editId = null;
                document.querySelector('.submit-btn').innerText = "CẬP NHẬT HÀNH TRÌNH";
            } else {
                trips.push(newTrip);
            }

            saveToLocal();
            tripForm.reset();
            imagePreview.style.display = 'none';
            uploadText.textContent = "📸 Nhấn để chọn ảnh từ máy tính";
            renderTrips();
            alert('Đã lưu thành công!');
        });

        renderTrips();
    </script>
</body>
</html>
