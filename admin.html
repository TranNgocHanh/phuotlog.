<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị Firebase | phuotlog84.tv</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #toast {
            position: fixed; top: 20px; right: 20px; background: #2ecc71; color: white;
            padding: 1rem 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none; z-index: 10000; font-weight: bold;
        }
        .loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none;
            justify-content: center; align-items: center; z-index: 10001; color: white; flex-direction: column;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
        input, textarea, select {
            padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05); color: white;
        }
        .submit-btn {
            background: var(--accent-gradient); color: white; padding: 1rem; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
        }
        .submit-btn:hover { transform: scale(1.02); }
        .preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; margin: 5px; }
    </style>
</head>
<body style="font-family: 'Times New Roman', Times, serif;">

    <div id="toast">✅ Đã cập nhật!</div>
    <div class="loading-overlay" id="loadingOverlay">
        <div style="font-size: 2rem;">🚀</div>
        <p>Đang tải dữ liệu lên Đám mây... <span id="uploadProgress">0</span>%</p>
    </div>

    <main style="max-width: 1000px; margin: 4rem auto; padding: 2rem;">
        <header style="margin-bottom: 3rem; text-align: center;">
            <h1 style="font-size: 3rem; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">HỆ THỐNG CLOUD PHUOTLOG</h1>
            <p style="color: var(--text-muted);">Dữ liệu của bạn hiện đã được đồng bộ hóa trên toàn thế giới.</p>
        </header>

        <!-- THỐNG KÊ -->
        <section style="background: var(--card-bg); padding: 2rem; border-radius: 20px; margin-bottom: 2rem; border: 1px solid var(--glass-border);">
            <h2 style="color: #feca57; margin-bottom: 1.5rem;">📊 THỐNG KÊ TỔNG (CLOUD)</h2>
            <div class="form-grid">
                <div class="input-group"><label>Tổng KM</label><input type="text" id="statKm"></div>
                <div class="input-group"><label>Tỉnh thành</label><input type="text" id="statProvinces"></div>
                <div class="input-group"><label>Đỉnh núi</label><input type="text" id="statPeaks"></div>
                <div class="input-group"><label>Số năm</label><input type="text" id="statYears"></div>
            </div>
            <button id="btnSaveStats" class="submit-btn" style="background: #3498db;">LƯU THỐNG KÊ LÊN CLOUD</button>
        </section>

        <!-- PHẦN 1: QUẢN LÝ BẢN ĐỒ (CLOUD) -->
        <section style="background: var(--card-bg); padding: 2rem; border-radius: 20px; border: 1px solid var(--glass-border); margin-bottom: 2rem;">
            <h2 style="margin-bottom: 1rem; color: var(--secondary-color);">📍 BẢN ĐỒ DẤU CHÂN (CLOUD)</h2>
            <div id="province-checklist" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; max-height: 400px; overflow-y: auto;">
                <!-- MIỀN BẮC -->
                <label><input type="checkbox" value="vn-hc"> Hà Nội</label>
                <label><input type="checkbox" value="vn-hp"> Hải Phòng</label>
                <label><input type="checkbox" value="vn-hg"> Hà Giang</label>
                <label><input type="checkbox" value="vn-cb"> Cao Bằng</label>
                <label><input type="checkbox" value="vn-bk"> Bắc Kạn</label>
                <label><input type="checkbox" value="vn-ty"> Tuyên Quang</label>
                <label><input type="checkbox" value="vn-ls"> Lạng Sơn</label>
                <label><input type="checkbox" value="vn-qn"> Quảng Ninh</label>
                <label><input type="checkbox" value="vn-bn"> Bắc Ninh</label>
                <label><input type="checkbox" value="vn-bg"> Bắc Giang</label>
                <label><input type="checkbox" value="vn-pt"> Phú Thọ</label>
                <label><input type="checkbox" value="vn-vp"> Vĩnh Phúc</label>
                <label><input type="checkbox" value="vn-hd"> Hải Dương</label>
                <label><input type="checkbox" value="vn-hy"> Hưng Yên</label>
                <label><input type="checkbox" value="vn-tb"> Thái Bình</label>
                <label><input type="checkbox" value="vn-nd"> Nam Định</label>
                <label><input type="checkbox" value="vn-db"> Điện Biên</label>
                <label><input type="checkbox" value="vn-lc"> Lai Châu</label>
                <label><input type="checkbox" value="vn-sl"> Sơn La</label>
                <label><input type="checkbox" value="vn-yb"> Yên Bái</label>
                <label><input type="checkbox" value="vn-hb"> Hòa Bình</label>
                <label><input type="checkbox" value="vn-nb"> Ninh Bình</label>
                <label><input type="checkbox" value="vn-hn"> Hà Nam</label>
                <label><input type="checkbox" value="vn-tn"> Thái Nguyên</label>
                <!-- MIỀN TRUNG -->
                <label><input type="checkbox" value="vn-th"> Thanh Hóa</label>
                <label><input type="checkbox" value="vn-na"> Nghệ An</label>
                <label><input type="checkbox" value="vn-ht"> Hà Tĩnh</label>
                <label><input type="checkbox" value="vn-qb"> Quảng Bình</label>
                <label><input type="checkbox" value="vn-qt"> Quảng Trị</label>
                <label><input type="checkbox" value="vn-tth"> Thừa Thiên Huế</label>
                <label><input type="checkbox" value="vn-dn"> Đà Nẵng</label>
                <label><input type="checkbox" value="vn-qnam"> Quảng Nam</label>
                <label><input type="checkbox" value="vn-qng"> Quảng Ngãi</label>
                <label><input type="checkbox" value="vn-bd"> Bình Định</label>
                <label><input type="checkbox" value="vn-py"> Phú Yên</label>
                <label><input type="checkbox" value="vn-kh"> Khánh Hòa</label>
                <label><input type="checkbox" value="vn-nt"> Ninh Thuận</label>
                <label><input type="checkbox" value="vn-bt"> Bình Thuận</label>
                <label><input type="checkbox" value="vn-kt"> Kon Tum</label>
                <label><input type="checkbox" value="vn-gl"> Gia Lai</label>
                <label><input type="checkbox" value="vn-dl"> Đắk Lắk</label>
                <label><input type="checkbox" value="vn-dk"> Đắk Nông</label>
                <label><input type="checkbox" value="vn-ld"> Lâm Đồng</label>
                <!-- MIỀN NAM -->
                <label><input type="checkbox" value="vn-tp"> TP.Hồ Chí Minh</label>
                <label><input type="checkbox" value="vn-br"> Bà Rịa - Vũng Tàu</label>
                <label><input type="checkbox" value="vn-bi"> Bình Dương</label>
                <label><input type="checkbox" value="vn-bp"> Bình Phước</label>
                <label><input type="checkbox" value="vn-tn"> Tây Ninh</label>
                <label><input type="checkbox" value="vn-db"> Đồng Nai</label>
                <label><input type="checkbox" value="vn-la"> Long An</label>
                <label><input type="checkbox" value="vn-tg"> Tiền Giang</label>
                <label><input type="checkbox" value="vn-ben"> Bến Tre</label>
                <label><input type="checkbox" value="vn-tv"> Trà Vinh</label>
                <label><input type="checkbox" value="vn-vl"> Vĩnh Long</label>
                <label><input type="checkbox" value="vn-ct"> Cần Thơ</label>
                <label><input type="checkbox" value="vn-hg"> Hậu Giang</label>
                <label><input type="checkbox" value="vn-dt"> Đồng Tháp</label>
                <label><input type="checkbox" value="vn-ag"> An Giang</label>
                <label><input type="checkbox" value="vn-kg"> Kiên Giang</label>
                <label><input type="checkbox" value="vn-st"> Sóc Trăng</label>
                <label><input type="checkbox" value="vn-bl"> Bạc Liêu</label>
                <label><input type="checkbox" value="vn-cm"> Cà Mau</label>
                <!-- ĐẢO -->
                <label style="color: #feca57; font-weight: bold;"><input type="checkbox" value="vn-hs"> HOÀNG SA</label>
                <label style="color: #feca57; font-weight: bold;"><input type="checkbox" value="vn-ts"> TRƯỜNG SA</label>
            </div>
            <button id="btnSaveMap" class="submit-btn" style="background: var(--secondary-color);">CẬP NHẬT BẢN ĐỒ LÊN CLOUD</button>
        </section>

        <!-- THÊM HÀNH TRÌNH -->
        <section style="background: var(--card-bg); padding: 2rem; border-radius: 20px; border: 1px solid var(--glass-border);">

            <h2 style="color: var(--secondary-color); margin-bottom: 1.5rem;">📝 THÊM HÀNH TRÌNH MỚI</h2>
            <form id="tripForm">
                <div class="form-grid">
                    <div class="input-group"><label>Tên chuyến đi</label><input type="text" id="tripName" required></div>
                    <div class="input-group">
                        <label>Năm</label>
                        <select id="tripYear">
                            <option value="2023">2023</option><option value="2024">2024</option>
                            <option value="2025">2025</option><option value="2026">2026</option>
                        </select>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="input-group"><label>Số KM</label><input type="number" id="tripKm"></div>
                    <div class="input-group"><label>Chi phí</label><input type="text" id="tripCost"></div>
                </div>
                <div class="input-group"><label>Lộ trình cụ thể</label><textarea id="tripRoute" rows="3"></textarea></div>
                <div class="input-group"><label>Cảm xúc chuyến đi</label><textarea id="tripFeel" rows="3"></textarea></div>
                
                <div class="form-grid">
                    <div class="input-group">
                        <label>Ảnh đại diện (Cloud Upload)</label>
                        <input type="file" id="featuredImg" accept="image/*">
                        <div id="featPreview"></div>
                    </div>
                    <div class="input-group">
                        <label>Album ảnh (Chọn nhiều file)</label>
                        <input type="file" id="albumImgs" accept="image/*" multiple>
                        <div id="albumPreview"></div>
                    </div>
                </div>
                <button type="submit" class="submit-btn">ĐẨY HÀNH TRÌNH LÊN CLOUD ☁️</button>
            </form>
        </section>

        <!-- DANH SÁCH -->
        <section style="margin-top: 3rem;">
            <h2 style="margin-bottom: 1.5rem;">📅 CÁC CHUYẾN ĐI TRÊN CLOUD</h2>
            <div id="cloudTripsList" style="display: grid; gap: 1rem;"></div>
        </section>

        <div style="margin-top: 3rem; text-align: center; opacity: 0.5;">
            <button onclick="migrateData()" style="background: none; border: 1px solid white; color: white; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer;">Đồng bộ dữ liệu cũ từ máy tính lên Cloud (Chỉ làm 1 lần)</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWwqbO7zNoUT-_NvJ12oPzzrkNJbv_xco",
            authDomain: "phuotlog.firebaseapp.com",
            projectId: "phuotlog",
            storageBucket: "phuotlog.firebasestorage.app",
            messagingSenderId: "349647181935",
            appId: "1:349647181935:web:360d32ac7a0ebcb28fd59a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const loadingOverlay = document.getElementById('loadingOverlay');
        const progressText = document.getElementById('uploadProgress');

        // --- XỬ LÝ BẢN ĐỒ ---
        async function loadMap() {
            const docRef = doc(db, "settings", "map");
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                const visited = data.provinces || [];
                document.querySelectorAll('#province-checklist input').forEach(cb => {
                    cb.checked = visited.includes(cb.value);
                });
            }
        }
        loadMap();

        document.getElementById('btnSaveMap').onclick = async () => {
            const visited = [];
            document.querySelectorAll('#province-checklist input:checked').forEach(cb => {
                visited.push(cb.value);
            });
            await setDoc(doc(db, "settings", "map"), { provinces: visited });
            showToast("📍 Đã cập nhật bản đồ lên Cloud!");
        };

        // --- XỬ LÝ THỐNG KÊ ---
        async function loadStats() {
            const docRef = doc(db, "settings", "stats");
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('statKm').value = data.km || "0";
                document.getElementById('statProvinces').value = data.provinces || "0";
                document.getElementById('statPeaks').value = data.peaks || "0";
                document.getElementById('statYears').value = data.years || "0";
            }
        }
        loadStats();

        document.getElementById('btnSaveStats').onclick = async () => {
            const stats = {
                km: document.getElementById('statKm').value,
                provinces: document.getElementById('statProvinces').value,
                peaks: document.getElementById('statPeaks').value,
                years: document.getElementById('statYears').value
            };
            await setDoc(doc(db, "settings", "stats"), stats);
            showToast("✅ Đã lưu thống kê lên Cloud!");
        };

        // --- XỬ LÝ UPLOAD ẢNH ---
        async function uploadFile(file) {
            if (!file) return null;
            const storageRef = ref(storage, `trips/${Date.now()}_${file.name}`);
            const uploadTask = uploadBytesResumable(storageRef, file);
            
            return new Promise((resolve, reject) => {
                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
                        progressText.innerText = progress;
                    }, 
                    (error) => reject(error), 
                    () => getDownloadURL(uploadTask.snapshot.ref).then(url => resolve(url))
                );
            });
        }

        // --- XỬ LÝ FORM HÀNH TRÌNH ---
        document.getElementById('tripForm').onsubmit = async (e) => {
            e.preventDefault();
            loadingOverlay.style.display = 'flex';

            try {
                const featFile = document.getElementById('featuredImg').files[0];
                const albumFiles = document.getElementById('albumImgs').files;

                const featUrl = await uploadFile(featFile);
                const albumUrls = [];
                for (let f of albumFiles) {
                    const url = await uploadFile(f);
                    albumUrls.push(url);
                }

                const tripData = {
                    name: document.getElementById('tripName').value,
                    year: document.getElementById('tripYear').value,
                    km: document.getElementById('tripKm').value,
                    cost: document.getElementById('tripCost').value,
                    route: document.getElementById('tripRoute').value,
                    feel: document.getElementById('tripFeel').value,
                    image: featUrl || "https://images.unsplash.com/photo-1504457047772-27fad17438ef?w=800",
                    album: albumUrls,
                    createdAt: Date.now()
                };

                await addDoc(collection(db, "trips"), tripData);
                showToast("✅ Đã đẩy hành trình lên Cloud!");
                location.reload();
            } catch (err) {
                alert("Lỗi upload: " + err.message);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        };

        // --- DANH SÁCH CHUYẾN ĐI ---
        async function loadTrips() {
            const q = query(collection(db, "trips"), orderBy("year", "desc"));
            const querySnapshot = await getDocs(q);
            const list = document.getElementById('cloudTripsList');
            list.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const trip = doc.data();
                const item = document.createElement('div');
                item.style = "background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;";
                item.innerHTML = `
                    <div>
                        <strong>[${trip.year}] ${trip.name}</strong> - ${trip.km} KM
                    </div>
                    <button onclick="deleteTrip('${doc.id}')" style="background: #ff4757; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Xóa</button>
                `;
                list.appendChild(item);
            });
        }
        loadTrips();

        window.deleteTrip = async (id) => {
            if (confirm("Xóa hành trình này khỏi Cloud?")) {
                await deleteDoc(doc(db, "trips", id));
                location.reload();
            }
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // MIGRATION (ĐỒNG BỘ CŨ)
        window.migrateData = async () => {
            const oldTrips = JSON.parse(localStorage.getItem('myTrips')) || [];
            const oldProvinces = JSON.parse(localStorage.getItem('visitedProvinces')) || [];
            const oldStats = JSON.parse(localStorage.getItem('myStats')) || {};
            
            loadingOverlay.style.display = 'flex';
            
            // Đẩy tỉnh thành lên Cloud
            if (oldProvinces.length > 0) {
                await setDoc(doc(db, "settings", "map"), { provinces: oldProvinces });
            }

            // Đẩy thống kê lên Cloud
            if (oldStats.km) {
                await setDoc(doc(db, "settings", "stats"), oldStats);
            }

            // Đẩy hành trình lên Cloud
            for (let t of oldTrips) {
                await addDoc(collection(db, "trips"), { ...t, createdAt: Date.now() });
            }
            
            alert("Đồng bộ hoàn tất! Mọi dữ liệu cũ đã lên Đám mây.");
            location.reload();
        };

    </script>
</body>
</html>
